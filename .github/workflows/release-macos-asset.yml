name: Release macOS Asset

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-macos-arm64:
    runs-on: macos-14
    env:
      CXXFLAGS: -include cstdint
      GH_TOKEN: ${{ github.token }}
      HOMEBREW_NO_AUTO_UPDATE: "1"
      OPENSSL_NO_VENDOR: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Install macOS build dependencies
        run: |
          brew install llvm protobuf
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"
          echo "PROTOC=$(brew --prefix protobuf)/bin/protoc" >> "$GITHUB_ENV"

      - name: Install Rust 1.88.0
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain 1.88.0
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build powd
        run: cargo build --release --bin powd

      - name: Package macOS Apple Silicon asset
        id: package
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          test -n "$version"
          tag="v$version"
          if [ "$tag" != "${GITHUB_REF_NAME}" ]; then
            echo "tag ${GITHUB_REF_NAME} does not match Cargo.toml version ${version}" >&2
            exit 1
          fi
          output_dir="$RUNNER_TEMP/release-assets"
          archive_path="$(scripts/pack-release.sh target/release/powd "$version" darwin-arm64 "$output_dir")"
          echo "archive_path=$archive_path" >> "$GITHUB_OUTPUT"

      - name: Ensure release exists
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            exit 0
          fi
          prerelease_flag=""
          if [[ "$tag" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$tag" \
            --generate-notes \
            ${prerelease_flag}

      - name: Upload macOS Apple Silicon asset
        run: |
          archive_path="${{ steps.package.outputs.archive_path }}"
          gh release upload "${GITHUB_REF_NAME}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber \
            "$archive_path" \
            "$archive_path.sha256"
