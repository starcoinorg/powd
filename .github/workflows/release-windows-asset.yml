name: Release Windows Asset

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing powd release tag to build and upload the Windows asset for, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-windows-x64:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Windows build dependencies
        run: choco install protoc --no-progress -y

      - name: Install Rust 1.88.0
        shell: pwsh
        run: |
          $rustup = Join-Path $env:RUNNER_TEMP "rustup-init.exe"
          Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile $rustup
          & $rustup -y --profile minimal --default-toolchain 1.88.0
          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build powd
        run: cargo build --release --bin powd

      - name: Package Windows x64 asset
        id: package
        shell: pwsh
        env:
          TARGET_TAG: ${{ github.event.inputs.tag || (github.ref_type == 'tag' && github.ref_name) || '' }}
        run: |
          $version = (Get-Content Cargo.toml | Select-String '^version = "(.+)"$' | Select-Object -First 1).Matches[0].Groups[1].Value
          if (-not $version) {
            throw "failed to resolve Cargo.toml version"
          }
          if ($env:TARGET_TAG) {
            $tag = "v$version"
            if ($tag -ne $env:TARGET_TAG) {
              throw "tag $($env:TARGET_TAG) does not match Cargo.toml version $version"
            }
          }
          $outputDir = Join-Path $env:RUNNER_TEMP "release-assets"
          $archivePath = node scripts/pack-release.mjs "target/release/powd.exe" "$version" "windows-x86_64" "$outputDir"
          "archive_path=$archivePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Ensure release exists
        if: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
        shell: pwsh
        env:
          TARGET_TAG: ${{ github.event.inputs.tag || (github.ref_type == 'tag' && github.ref_name) || '' }}
        run: |
          $tag = $env:TARGET_TAG
          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            exit 0
          }
          $args = @(
            "release", "create", $tag,
            "--repo", $env:GITHUB_REPOSITORY,
            "--verify-tag",
            "--title", $tag,
            "--generate-notes"
          )
          if ($tag.Contains("-")) {
            $args += "--prerelease"
          }
          & gh @args

      - name: Upload Windows x64 asset
        if: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
        shell: pwsh
        env:
          TARGET_TAG: ${{ github.event.inputs.tag || (github.ref_type == 'tag' && github.ref_name) || '' }}
        run: |
          $archivePath = "${{ steps.package.outputs.archive_path }}"
          gh release upload $env:TARGET_TAG `
            --repo $env:GITHUB_REPOSITORY `
            --clobber `
            $archivePath `
            "$archivePath.sha256"
