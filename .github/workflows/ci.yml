name: CI

on:
  push:
    branches:
      - master
      - "feat/**"
      - "fix/**"
      - "refactor/**"
      - "debug/**"
  pull_request:

jobs:
  rust-linux:
    runs-on: ubuntu-latest
    env:
      CXXFLAGS: -include cstdint
      OPENSSL_NO_VENDOR: "1"
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libssl-dev mold pkg-config protobuf-compiler

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Rust 1.88.0
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain 1.88.0
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/rustup" component add clippy rustfmt

      - name: Run Rust tests
        run: cargo test

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run plugin unit tests
        run: |
          cd plugins/openclaw-powd
          npm test

  rust-macos-arm64:
    runs-on: macos-14
    env:
      CXXFLAGS: -include cstdint
      HOMEBREW_NO_AUTO_UPDATE: "1"
      OPENSSL_NO_VENDOR: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install macOS build dependencies
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            brew install jq
          fi
          brew install llvm protobuf
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"
          echo "PROTOC=$(brew --prefix protobuf)/bin/protoc" >> "$GITHUB_ENV"

      - name: Install Rust 1.88.0
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain 1.88.0
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          "$HOME/.cargo/bin/rustup" component add clippy rustfmt

      - name: Run Rust tests
        run: cargo test

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run plugin unit tests
        run: |
          cd plugins/openclaw-powd
          npm test

      - name: Bootstrap OpenClaw for plugin smoke
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          corepack enable
          OPENCLAW_VERSION="$(sed -n 's/^  version = "\(.*\)";$/\1/p' openclaw.nix | head -n 1)"
          test -n "$OPENCLAW_VERSION"
          INSTALL_ROOT="$RUNNER_TEMP/openclaw-cli"
          npm install --prefix "$INSTALL_ROOT" "openclaw@${OPENCLAW_VERSION}"
          mkdir -p "$RUNNER_TEMP/bin"
          cat >"$RUNNER_TEMP/bin/openclaw" <<EOF
          #!/usr/bin/env bash
          exec node "$INSTALL_ROOT/node_modules/openclaw/openclaw.mjs" "\$@"
          EOF
          chmod +x "$RUNNER_TEMP/bin/openclaw"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run plugin smoke
        run: node scripts/plugin-smoke.mjs

  rust-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Windows build dependencies
        run: choco install protoc --no-progress -y

      - name: Install Rust 1.88.0
        shell: pwsh
        run: |
          $rustup = Join-Path $env:RUNNER_TEMP "rustup-init.exe"
          Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile $rustup
          & $rustup -y --profile minimal --default-toolchain 1.88.0
          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$env:USERPROFILE\.cargo\bin\rustup.exe" component add clippy rustfmt

      - name: Run Rust tests
        run: cargo test

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run plugin unit tests
        run: |
          cd plugins/openclaw-powd
          npm test

      - name: Bootstrap OpenClaw for plugin smoke
        shell: pwsh
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          corepack enable
          $match = Select-String -Path openclaw.nix -Pattern '^  version = "(.+)";$' | Select-Object -First 1
          if (-not $match) {
            throw "failed to resolve OpenClaw version from openclaw.nix"
          }
          $openclawVersion = $match.Matches[0].Groups[1].Value
          $installRoot = Join-Path $env:RUNNER_TEMP "openclaw-cli"
          npm install --prefix $installRoot "openclaw@$openclawVersion"
          $binDir = Join-Path $env:RUNNER_TEMP "bin"
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          @"
          @echo off
          node "$installRoot\node_modules\openclaw\openclaw.mjs" %*
          "@ | Set-Content -Path (Join-Path $binDir "openclaw.cmd") -Encoding Ascii
          $binDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run plugin smoke
        run: node scripts/plugin-smoke.mjs
